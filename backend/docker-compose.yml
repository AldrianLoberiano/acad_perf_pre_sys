version: '3.9'
services:
  api:
    build: .
    container_name: academic-prediction-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:15
    container_name: academic-prediction-db
    environment:
      POSTGRES_DB: academic_perf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
